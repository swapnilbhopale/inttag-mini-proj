<div class="main">
  <div class="container">
    <div class="row mb-3">
      <div class="col-12 text-end">
        <button class="btn btn-info list" routerLink="/dashboard">See List</button>
      </div>
    </div>
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6 card-wrapper">
        <div class="card p-4 shadow">
          <h1 class="title text-center mb-4">
            {{ buttonText == 'Register' ? 'Create' : 'Update' }} Employee
          </h1>

          <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">
            <div class="form-group mb-3">
              <label>Full Name</label>
              <input
                type="text"
                class="form-control"
                placeholder="enter full name"
                formControlName="name"
              />
            </div>

            <div class="form-group mb-3">
              <label>Designation</label>
              <input
                type="text"
                class="form-control"
                placeholder="enter designation"
                formControlName="designation"
              />
            </div>

            <div class="form-group mb-3">
              <label>Email</label>
              <input
                type="email"
                class="form-control"
                placeholder="enter email"
                formControlName="email"
              />
            </div>

            <div class="form-group mb-3">
              <label>Phone</label>
              <input
                type="tel"
                class="form-control"
                placeholder="enter phone no."
                formControlName="phone"
              />
            </div>

            <div class="form-group mb-3">
              <label>Address</label>
              <input
                type="text"
                class="form-control"
                placeholder="enter address"
                formControlName="address"
              />
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary" [disabled]="employeeForm.invalid">
                {{ buttonText }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="container">
    <div class="card">
      <h1 class="title">Register Employee</h1>
      <form [formGroup]="employeeForm">
        <div class="form-group">
          <label>Full Name</label>
          <input
            type="text"
            class="form-control"
            placeholder="Type your full name."
            formControlName="name"
            appOnlyAlphabets
          />
        </div>

        <div class="form-group">
          <label>Designation</label>
          <input
            type="text"
            class="form-control"
            placeholder="Type your designation."
            formControlName="designation"
            appOnlyAlphabets
          />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            class="form-control"
            placeholder="Type your email."
            formControlName="email"
          />
        </div>

        @if (employeeForm.get('email')?.invalid && employeeForm.get('email')?.touched) {
          <div>
            @if (employeeForm.get('email')?.errors?.['email']) {
              <small class="text-danger"> Enter vallidate email. </small>
            }
          </div>
        }

        <div class="form-group">
          <label>Phone</label>
          <input
            type="tel"
            class="form-control"
            placeholder="Type your mobile number."
            formControlName="phone"
          />
        </div>

        <div class="form-group">
          <label>Address</label>
          <input
            type="text"
            class="form-control"
            placeholder="Type your address."
            formControlName="address"
            appOnlyAlphabets
          />
        </div>

        <div class="login-btn">
          <button class="btn" (click)="onSubmit()" [disabled]="employeeForm.invalid">Submit</button>
        </div>
      </form>
    </div>
  </div>
</div>

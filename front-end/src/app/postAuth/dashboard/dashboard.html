<div class="main">
  <div class="container">
    <div class="row my-3">
      <div class="col-12 d-flex justify-content-between flex-wrap gap-2">
        <button class="btn btn-info" routerLink="/create-emp">Create Emp</button>
        <button class="btn btn-danger" (click)="logout()">Logout</button>
      </div>
    </div>
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8">
        <div class="card p-4 shadow">
          <div class="data-table table-responsive">
            <table class="table table-striped table-hover align-middle text-center">
              <thead class="table-dark">
                <tr>
                  <th>No</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th class="d-none d-md-table-cell">Designation</th>
                  <th class="d-none d-lg-table-cell">Address</th>
                  <th class="d-none d-md-table-cell">Phone</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                @for (item of empData; track $index) {
                  <tr>
                    <td>{{ $index + 1 }}</td>
                    <td>{{ item.name }}</td>
                    <td>{{ item.email }}</td>
                    <td class="d-none d-md-table-cell">{{ item.designation }}</td>
                    <td class="d-none d-lg-table-cell">{{ item.address }}</td>
                    <td class="d-none d-md-table-cell">{{ item.phone }}</td>
                    <td>
                      <div class="d-flex flex-column flex-md-row gap-2 justify-content-center">
                        <button
                          class="btn btn-sm btn-primary"
                          routerLink="/update-emp"
                          [state]="{ data: item }"
                        >
                          Edit
                        </button>
                        <button class="btn btn-sm btn-danger" (click)="deleteData(item.email)">
                          Delete
                        </button>
                      </div>
                    </td>
                  </tr>
                } @empty {
                  <tr>
                    <td colspan="7">No data available</td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="container">
    <div class="card">
      <h1 class="title">Login</h1>
      <form [formGroup]="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input
            type="text"
            class="form-control"
            placeholder="Type your username"
            formControlName="email"
          />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            class="form-control"
            placeholder="Type your password"
            formControlName="mobile"
          />
        </div>

        <div class="login-btn">
          <button class="btn" (click)="onSubmit()" [disabled]="loginForm.invalid">Login</button>
        </div>
        <p>Or SignUp</p>
      </form>
    </div>
  </div>
</div>
